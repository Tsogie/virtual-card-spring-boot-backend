spring.application.name=backend

spring.datasource.url=jdbc:postgresql://db:5432/leap_card
spring.datasource.username=postgres

spring.datasource.password=${DB_PASSWORD:7980}
jwt.secret=${JWT_SECRET:local-dev-secret-key-local-key-???-909090}

spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=INFO
logging.level.net.otgon.backend=DEBUG
logging.level.net.otgon.backend.service=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

server.port=3000